<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — Cognita</title>
<link rel="icon" href="/assets/favicon.png">
<link rel="stylesheet" href="/assets/site.css">
</head>
<body>
<div id="site-nav"></div>

<div class="dash">
  <h1 style="font-size:24px;margin-bottom:4px">لوحة التحكم</h1>
  <p class="muted" style="margin-top:0">إدارة حسابك، اشتراكك، وفواتيرك في Cognita.</p>
  <div id="msg" class="msg"></div>

  <!-- دخول -->
  <div id="auth" class="dcard" style="max-width:460px;margin:18px auto;display:none">
    <h3>تسجيل الدخول / إنشاء حساب</h3>
    <label>البريد الإلكتروني</label><input id="email" type="email" placeholder="you@example.com">
    <label>كلمة المرور</label><input id="password" type="password" placeholder="٦ أحرف على الأقل">
    <div class="row" style="display:flex;gap:10px">
      <button class="btn primary" id="login">دخول</button>
      <button class="btn ghost" id="register">حساب جديد</button>
    </div>
  </div>

  <!-- الحساب -->
  <div id="account" style="display:none">
    <div class="dgrid">
      <div class="dcard">
        <h3>اشتراكي</h3>
        <div class="kv"><span class="k">البريد</span><span id="u-email"></span></div>
        <div class="kv"><span class="k">نوع الاشتراك</span><span id="u-plan"></span></div>
        <div class="kv"><span class="k">ينتهي في</span><span id="u-exp"></span></div>
        <div class="kv"><span class="k">مفتاح التفعيل</span><span><code id="u-key">—</code> <button class="btn sm ghost" id="copy-key" style="display:none">نسخ</button></span></div>
        <hr class="sep"><button class="btn ghost sm" id="logout">تسجيل الخروج</button>
      </div>
      <div class="dcard">
        <h3>تفعيل ترخيص</h3>
        <label>مفتاح الترخيص</label>
        <input id="license" placeholder="COG-XXXX-XXXX-XXXX">
        <button class="btn primary block" id="activate">تفعيل المفتاح</button>
        <p class="muted small" style="margin-top:10px">استلمت مفتاحاً بعد الدفع؟ فعّله هنا.</p>
      </div>
    </div>

    <!-- اشتراك / تجديد -->
    <div class="dcard" style="margin-top:18px">
      <h3>الاشتراك في Pro / التجديد</h3>
      <div class="row" style="display:flex;gap:10px;flex-wrap:wrap;align-items:end">
        <div style="flex:1;min-width:180px"><label>الباقة</label><select id="cycle"></select></div>
        <button class="btn primary" id="order">إنشاء طلب اشتراك</button>
        <button class="btn" id="renew">تجديد اشتراكي</button>
      </div>
      <div id="pay" class="pay-box" style="display:none"></div>
    </div>

    <!-- الفواتير -->
    <div class="dcard" style="margin-top:18px">
      <h3>فواتيري</h3>
      <div id="invoices"></div>
    </div>
  </div>
</div>

<div id="site-footer"></div>
<script src="/assets/site.js"></script>
<script src="/assets/app.js"></script>
</body>
</html>
