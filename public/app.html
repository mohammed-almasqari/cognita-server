<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — Cognita</title>
<link rel="icon" href="/assets/favicon.png">
<link rel="stylesheet" href="/assets/site.css">
<style>
  .appwrap{max-width:840px;margin:0 auto;padding:26px 6vw 72px}
  .welcome{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .welcome h1{font-size:23px;margin:0}
  .welcome .who{font-size:13.5px;color:var(--muted)}
  /* بطاقة الحالة */
  .hero-status{border-radius:18px;padding:22px 24px;margin-bottom:18px;position:relative;overflow:hidden}
  .hero-status.pro{background:var(--grad);color:#fff;box-shadow:0 22px 55px rgba(99,102,241,.4)}
  .hero-status.pro::after{content:"✦";position:absolute;inset-inline-start:-10px;top:-20px;font-size:130px;opacity:.13}
  .hero-status.free{background:var(--card);border:1px solid var(--line)}
  .hero-status .lab{font-size:12.5px;font-weight:600;opacity:.85;letter-spacing:.5px}
  .hero-status .pn{font-size:26px;font-weight:800;margin:2px 0 4px}
  .hero-status .sub{font-size:13.5px;opacity:.92}
  .hero-status .cta{margin-top:14px}
  /* اختيار الباقة */
  .plan-opts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:4px 0 14px}
  @media(max-width:600px){.plan-opts{grid-template-columns:1fr}}
  .plan-opt{border:1.5px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;background:var(--bg2);transition:.15s;text-align:center;position:relative}
  .plan-opt:hover{border-color:var(--prompt)}
  .plan-opt.sel{border-color:var(--prompt);background:rgba(99,102,241,.12);box-shadow:0 0 0 3px rgba(99,102,241,.18)}
  .plan-opt .nm{font-size:13px;color:var(--muted);font-weight:600}
  .plan-opt .amt{font-size:21px;font-weight:800;margin:5px 0 0}
  .plan-opt .amt small{font-size:12px;color:var(--muted);font-weight:500}
  .plan-opt .save{display:inline-block;margin-top:5px;font-size:10.5px;color:#6ee7b7;background:rgba(16,185,129,.14);border-radius:100px;padding:2px 9px}
  /* الفواتير كبطاقات (متوافقة مع الجوال) */
  .inv-list{display:flex;flex-direction:column;gap:11px}
  .inv{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:15px 16px}
  .inv-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .inv-meta .num{font-weight:700;font-size:14.5px}
  .inv-meta .d{font-size:12.5px;color:var(--muted);margin-top:2px}
  .inv-right{text-align:left}
  .inv-amt{font-size:18px;font-weight:800;line-height:1.2}
  .inv-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px;align-items:center}
  .inv-actions input{margin:0;max-width:180px}
  .keychip{margin-top:11px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-family:monospace;direction:ltr;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .empty{text-align:center;color:var(--muted);padding:26px 10px;border:1px dashed var(--line);border-radius:14px}
  .paybox{margin-top:12px;display:flex;flex-direction:column;gap:10px}
  .paybox .ppbtn{background:#ffc439;color:#0b1020;font-weight:800}
  .bankpay{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px 13px}
  .bankpay summary{cursor:pointer;font-weight:700;font-size:13.5px}
  .bankdet{white-space:pre-wrap;direction:rtl;font-family:inherit;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:10px;margin:8px 0;font-size:13px}
  .bankpay input[type=file]{padding:7px;font-size:12.5px}
  .authcard{max-width:430px;margin:34px auto}
  .authcard .lg{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;justify-content:center;margin-bottom:6px}
  .authcard .lg img{width:34px;height:34px;border-radius:9px}
  .seg2{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:4px;margin:14px 0}
  .seg2 button{flex:1;background:transparent;border:0;color:var(--ink2);font-family:inherit;font-weight:700;font-size:13.5px;padding:9px;border-radius:8px;cursor:pointer}
  .seg2 button.on{background:var(--grad);color:#fff}
</style>
</head>
<body>
<div id="site-nav"></div>

<div class="appwrap">
  <div id="msg" class="msg"></div>

  <!-- دخول / تسجيل -->
  <div id="auth" class="dcard authcard" style="display:none">
    <div class="lg"><img src="/assets/icon.png" alt=""> Cognita</div>
    <p class="muted small center" style="margin:0 0 4px">لوحة تحكم العميل — حسابك واشتراكك وفواتيرك</p>
    <div class="seg2"><button id="tab-login" class="on">دخول</button><button id="tab-register">حساب جديد</button></div>
    <label>البريد الإلكتروني</label><input id="email" type="email" placeholder="you@example.com" autocomplete="email">
    <label>كلمة المرور</label><input id="password" type="password" placeholder="٦ أحرف على الأقل" autocomplete="current-password">
    <button class="btn primary block" id="auth-submit">دخول</button>
  </div>

  <!-- الحساب -->
  <div id="account" style="display:none">
    <div class="welcome">
      <div><h1>مرحباً بك 👋</h1><div class="who" id="u-email"></div></div>
      <button class="btn ghost sm" id="logout">تسجيل الخروج</button>
    </div>

    <!-- بطاقة الحالة -->
    <div id="status-card" class="hero-status free"></div>

    <div class="dgrid">
      <!-- تفاصيل الاشتراك -->
      <div class="dcard">
        <h3>تفاصيل الاشتراك</h3>
        <div class="kv"><span class="k">نوع الاشتراك</span><span id="u-plan"></span></div>
        <div class="kv"><span class="k">ينتهي في</span><span id="u-exp"></span></div>
        <div class="kv"><span class="k">مفتاح التفعيل</span><span id="u-keywrap"><code id="u-key">—</code></span></div>
        <div id="u-keychip"></div>
      </div>
      <!-- تفعيل ترخيص -->
      <div class="dcard">
        <h3>تفعيل ترخيص</h3>
        <label>مفتاح الترخيص</label>
        <input id="license" placeholder="COG-XXXX-XXXX-XXXX">
        <button class="btn primary block" id="activate">تفعيل المفتاح</button>
        <p class="muted small" style="margin-top:10px">استلمت مفتاحاً بعد الدفع؟ فعّله هنا فوراً.</p>
      </div>
    </div>

    <!-- اشتراك / تجديد -->
    <div class="dcard" style="margin-top:18px">
      <h3 id="sub-title">الاشتراك في Pro</h3>
      <p class="muted small" style="margin:0 0 12px">اختر الباقة المناسبة ثم أنشئ الطلب — الدفع بتحويل بنكي ويُصدَر مفتاحك بعد التأكيد.</p>
      <div class="plan-opts" id="plan-opts"></div>
      <div class="row" style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn primary" id="order">إنشاء طلب اشتراك</button>
        <button class="btn ghost" id="renew">تجديد اشتراكي</button>
      </div>
      <div id="pay" class="pay-box" style="display:none;margin-top:14px"></div>
    </div>

    <!-- الفواتير -->
    <div class="dcard" style="margin-top:18px">
      <div style="display:flex;align-items:center;justify-content:space-between"><h3 style="margin:0">فواتيري</h3><button class="btn sm ghost" id="inv-refresh">تحديث</button></div>
      <div id="invoices" style="margin-top:12px"></div>
    </div>
  </div>
</div>

<div id="site-footer"></div>
<script src="/assets/site.js"></script>
<script src="/assets/app.js"></script>
</body>
</html>
