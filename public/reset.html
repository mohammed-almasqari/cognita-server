<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تعيين كلمة المرور — Cognita</title>
<link rel="icon" href="/assets/favicon.png">
<link rel="stylesheet" href="/assets/site.css">
</head>
<body>
<div id="site-nav"></div>
<div class="appwrap" style="max-width:440px;margin:0 auto;padding:40px 6vw 70px">
  <div id="msg" class="msg"></div>
  <div class="dcard">
    <div style="display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;justify-content:center;margin-bottom:6px"><img src="/assets/icon.png" style="width:34px;height:34px;border-radius:9px" alt=""> Cognita</div>
    <h3 style="text-align:center">إعادة تعيين كلمة المرور</h3>
    <div id="form">
      <label>كلمة المرور الجديدة</label>
      <input id="pw" type="password" placeholder="٦ أحرف على الأقل" autocomplete="new-password">
      <label>تأكيد كلمة المرور</label>
      <input id="pw2" type="password" autocomplete="new-password">
      <button class="btn primary block" id="go">تعيين كلمة المرور</button>
    </div>
    <p class="muted small center" id="done" style="display:none;margin-top:10px">تم تغيير كلمة المرور ✓ <a href="/app">سجّل الدخول الآن</a></p>
    <p class="muted small center" style="margin-top:12px"><a href="/app">العودة للوحة التحكم</a></p>
  </div>
</div>
<div id="site-footer"></div>
<script src="/assets/site.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const p = new URLSearchParams(location.search);
const token = p.get("token") || "", email = p.get("email") || "";
function msg(t, k){ const m=$("msg"); m.textContent=t; m.className="msg "+(k||"ok"); }
if (!token || !email) { msg("رابط غير صالح. اطلب رابط إعادة تعيين جديداً من صفحة الدخول.", "err"); $("form").style.display="none"; }
$("go").onclick = async () => {
  const pw = $("pw").value, pw2 = $("pw2").value;
  if (pw.length < 6) return msg("كلمة المرور 6 أحرف على الأقل.", "err");
  if (pw !== pw2) return msg("كلمتا المرور غير متطابقتين.", "err");
  $("go").disabled = true;
  try {
    const r = await fetch("/api/auth/reset", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ email, token, password: pw }) });
    const d = await r.json().catch(()=>({}));
    if (!r.ok) throw new Error(d.error || "تعذّر التغيير");
    $("form").style.display="none"; $("done").style.display="block"; msg("تم تغيير كلمة المرور بنجاح ✓", "ok");
  } catch (e) { msg(e.message, "err"); $("go").disabled = false; }
};
</script>
</body>
</html>
